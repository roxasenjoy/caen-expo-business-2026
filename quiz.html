    <div class="container container-page">
        <div class="quiz-page">
            <!-- Lead Form -->
            <div class="quiz-lead-form" id="quizLeadForm">
                <h3>Avant de commencer, parlez-nous de vous</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Nom *</label>
                        <input type="text" id="leadNom" placeholder="Votre nom" required>
                    </div>
                    <div class="form-group">
                        <label>Prénom *</label>
                        <input type="text" id="leadPrenom" placeholder="Votre prénom" required>
                    </div>
                </div>
                <div class="form-row full">
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" id="leadEmail" placeholder="votre@email.com" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Entreprise *</label>
                        <input type="text" id="leadEntreprise" placeholder="Nom de l'entreprise" required>
                    </div>
                    <div class="form-group">
                        <label>Secteur</label>
                        <select id="leadSecteur">
                            <option value="">-- Sélectionnez --</option>
                            <option value="tech">Technologie</option>
                            <option value="finance">Finance</option>
                            <option value="sante">Santé</option>
                            <option value="retail">Retail</option>
                            <option value="manufacturing">Manufacturing</option>
                            <option value="education">Éducation</option>
                            <option value="autre">Autre</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Taille entreprise</label>
                        <select id="leadTaille">
                            <option value="">-- Sélectionnez --</option>
                            <option value="1-10">1-10 personnes</option>
                            <option value="11-50">11-50 personnes</option>
                            <option value="51-200">51-200 personnes</option>
                            <option value="201-1000">201-1000 personnes</option>
                            <option value="1000+">1000+ personnes</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Fonction</label>
                        <input type="text" id="leadFonction" placeholder="Ex: Directeur IT">
                    </div>
                </div>
                <button class="form-submit" id="startQuizBtn">Commencer le Quiz</button>
            </div>

            <!-- Quiz Progress -->
            <div class="quiz-progress" id="quizProgress" style="display: none;">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text">
                    Section <span id="currentSection">1</span> / <span id="totalSections">6</span>
                </div>
                <div class="xp-bar">
                    <span class="xp-text">Progression XP:</span>
                    <span class="xp-counter" id="xpCounter">0 / 500</span>
                </div>
                <div class="dimension-dots" id="dimensionDots"></div>
            </div>

            <!-- Quiz Sections -->
            <div id="quizSections"></div>

            <!-- Results Page -->
            <div class="results-page" id="resultsPage" style="display: none;">
                <div class="results-header">
                    <div class="result-name" id="resultName"></div>
                    <div class="score-ring" id="scoreRing"></div>
                    <div class="level-name" id="levelName"></div>
                    <div class="level-title" id="levelTitle"></div>
                    <div class="level-desc" id="levelDesc"></div>
                </div>

                <div class="results-content">
                    <div class="radar-container">
                        <canvas class="radar-canvas" id="radarChart" width="350" height="350"></canvas>
                    </div>
                    <div class="dimension-scores" id="dimensionScores"></div>
                </div>

                <div class="recos-section">
                    <div class="recos-title">Recommandations Personnalisées</div>
                    <div class="recos-grid" id="recosGrid"></div>
                </div>

                <div class="diploma-container">
                    <h3 style="margin-bottom: 16px;">Votre Diplôme</h3>
                    <canvas id="diplomaCanvas" width="800" height="600" style="max-width: 100%; height: auto; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 16px; display: block;"></canvas>
                    <button class="diploma-btn" id="downloadDiplomaBtn">Télécharger le Diplôme</button>
                </div>

                <div class="results-nav">
                    <a href="index.html" class="back-home">← Accueil</a>
                    <button class="new-quiz" id="newQuizBtn">Relancer le Quiz</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
